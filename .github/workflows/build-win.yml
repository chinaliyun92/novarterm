name: build-win
on:
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        default: "20"
jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Export Python Path
        run: |
          echo "PYTHON=${{ steps.setup-python.outputs.python-path }}" >> $env:GITHUB_ENV
          echo "npm_config_python=${{ steps.setup-python.outputs.python-path }}" >> $env:GITHUB_ENV
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Ensure Python tooling
        run: python -m pip install --upgrade pip setuptools
      - name: Install dependencies
        run: npm ci
      - name: Build Windows package
        run: npm run dist:win
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novarterm-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
