appId: com.novarterm.app
productName: NovarTerm
directories:
  output: release
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/AppIcon.png
    to: AppIcon.png
asar: true
# cpu-features (optional ssh2 dep) fails to rebuild under current node-gyp; app natives are
# rebuilt via postinstall / rebuild:native for better-sqlite3 and node-pty instead.
npmRebuild: false
publish:
  provider: github
  owner: chinaliyun92
  repo: novarterm
mac:
  icon: build/icon.icns
  target:
    - zip
  category: public.app-category.developer-tools
win:
  icon: build/icon.ico
  target:
    - nsis
linux:
  target:
    - AppImage
