appId: com.novarterm.app
productName: NovarTerm
directories:
  output: release
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/AppIcon.png
    to: AppIcon.png
asar: true
publish:
  provider: github
  owner: chinaliyun92
  repo: novarterm
mac:
  icon: build/icon.icns
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
win:
  target:
    - nsis
linux:
  target:
    - AppImage
