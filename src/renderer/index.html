<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovarTerm</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        background: #edf0ef;
      }

      .startup-loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 43%, rgba(103, 219, 181, 0.22), transparent 13%),
          radial-gradient(circle at 78% 24%, rgba(158, 206, 159, 0.18), transparent 14%),
          radial-gradient(circle at 74% 72%, rgba(130, 211, 168, 0.16), transparent 12%),
          #edf0ef;
      }

      .startup-mark {
        width: 56px;
        height: 56px;
        animation: startup-pulse 1.45s ease-in-out infinite;
      }

      .startup-mark svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      @keyframes startup-pulse {
        0%,
        100% {
          opacity: 0.55;
          transform: scale(0.96);
        }

        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }
    </style>
  </head>
  <body>
    <div id="startup-loading" class="startup-loading" aria-label="Loading NovarTerm">
      <div class="startup-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none">
          <rect x="6" y="6" width="52" height="52" rx="15" fill="#0b1220" />
          <path
            d="M19.5 45.5V19.5L44.5 45.5V19.5"
            stroke="url(#startup-logo-gradient)"
            stroke-width="6.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M44.5 17.5c.7 4.6 2.4 6.3 7 7-4.6.7-6.3 2.4-7 7-.7-4.6-2.4-6.3-7-7 4.6-.7 6.3-2.4 7-7Z"
            fill="#46f273"
          />
          <defs>
            <linearGradient id="startup-logo-gradient" x1="18" y1="19" x2="46" y2="47" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00d64f" />
              <stop offset="1" stop-color="#55f57b" />
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
